name: Deploy frontend to GitHub Pages

# Publishes the built frontend to the `gh-pages` branch (Pages Source = "Deploy from a branch
# -> gh-pages -> /"). Uses plain git so it does NOT consume the Actions artifact-storage quota.

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE: https://bojaN244-LicensePlates.hf.space
      - name: Publish to gh-pages branch
        run: |
          cd frontend/dist
          touch .nojekyll
          git init -q -b gh-pages
          git add -A
          git -c user.email=ci@users.noreply.github.com -c user.name=ci commit -q -m "deploy frontend ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
